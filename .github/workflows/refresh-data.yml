# Phase 2b — scheduled data refresh.
#
# Re-runs the scraper pipeline in CI, regenerates src/data/officials.json, and commits it.
# Pushing the updated JSON triggers the static host (Cloudflare Pages / Netlify) to rebuild
# and redeploy — so this is the whole "keep the site fresh" loop, with NO backend server.
#
# ───────────────────────────────────────────────────────────────────────────────────────
# IMPORTANT DESIGN NOTE — preserving human-curated data (READ BEFORE ENABLING THE SCHEDULE)
# ───────────────────────────────────────────────────────────────────────────────────────
# The pipeline auto-approves only careers + assets (factual, citable). Judgments and
# controversies require human approval (approved:false by default). The 225 controversies
# currently published were approved by a manual DB step — they exist ONLY in the committed
# src/data/officials.json, NOT in any scraper output.
#
# Therefore a naive "fresh DB → scrape → import → export" would DROP all curated
# controversies/judgments. To stay safe this job MUST seed the curated data back before
# exporting. That seed importer (scraper/seed-from-json.ts: read committed officials.json,
# upsert each official's controversies + approved judgments into the DB) is NOT built yet —
# see the `seed-curated` step below. Until it exists, run this workflow with
# REFRESH_SCOPE=assets-careers-only via workflow_dispatch, which refreshes auto-approved data
# by MERGE (never deletes), so nothing is lost.
#
# The judicial open-data feed (00–06 Taipei window, no CAPTCHA, reachable from CI) is a
# SEPARATE job — see judicial-feed.yml (pending the feed adapter). It only accumulates
# candidates for human review; it never auto-publishes judgments.
# ───────────────────────────────────────────────────────────────────────────────────────

name: Refresh data

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Which sources to refresh"
        type: choice
        default: assets-careers-only
        options:
          - assets-careers-only   # safe: merge-refresh auto-approved data, preserve curated
          - full                  # requires the seed-curated step to be implemented first
  schedule:
    # Weekly, Sunday 17:00 UTC = Mon 01:00 Taipei. Assets/careers change infrequently
    # (declarations are published periodically), so weekly is plenty — nightly would just
    # re-download ~1000 PDFs for nothing. Daily judicial work lives in judicial-feed.yml.
    - cron: "0 17 * * 0"

permissions:
  contents: write   # commit + push the regenerated src/data/officials.json

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # the cy getFile pass fetches ~1000 PDFs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Local Supabase stack inside the runner (Docker is available on ubuntu-latest).
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase + apply migrations
        run: |
          supabase start
          # Export the local stack's URL + service-role key for the scraper/import/export.
          {
            echo "PUBLIC_SUPABASE_URL=$(supabase status -o env | sed -n 's/^API_URL=//p' | tr -d '\"')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o env | sed -n 's/^SERVICE_ROLE_KEY=//p' | tr -d '\"')"
          } >> "$GITHUB_ENV"

      # ── Preserve curated data (controversies + approved judgments) ──────────────────
      # TODO(seed-curated): implement scraper/seed-from-json.ts and uncomment. Until then,
      # only run with scope=assets-careers-only (the import below MERGEs, never deletes, so
      # the absence of curated rows in a fresh DB is fine — we re-seed from the committed
      # JSON at export time instead). When the seed importer exists:
      #   pnpm run seed:from-json   # upsert committed officials.json's curated rows into DB
      - name: Seed curated data (pending)
        if: ${{ github.event.inputs.scope == 'full' }}
        run: |
          echo "::error::scope=full needs scraper/seed-from-json.ts (see DESIGN NOTE); aborting to avoid dropping curated controversies."
          exit 1

      # ── Refresh auto-approved data (careers + assets) ───────────────────────────────
      # One pass over all adapters (run.ts writes ONE combined review file per target, so a
      # single run is required — running per-source would overwrite the file each time).
      # Only careers + assets auto-approve; wiki controversies stay approved:false (not
      # imported) and the judgments adapter fails gracefully in CI.
      - name: Scrape (all sources, single pass)
        run: pnpm run scrape

      - name: Import
        run: pnpm run scrape:import   # idempotent upsert by natural keys; never deletes

      # ── Regenerate the committed snapshot ───────────────────────────────────────────
      # NOTE: export reads ONLY what's in the DB. For scope=assets-careers-only the fresh DB
      # lacks the curated controversies, so guard the export so we never overwrite the
      # committed JSON with a controversy-stripped one. The seed-curated step (above) is what
      # makes a faithful full export safe.
      - name: Export + verify nothing curated is lost
        run: |
          pnpm run export:data
          NEW=$(node -e "const o=require('./src/data/officials.json');console.log(o.reduce((n,x)=>n+(x.controversies?.length||0),0))")
          OLD=$(git show HEAD:src/data/officials.json | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{const o=JSON.parse(s);console.log(o.reduce((n,x)=>n+(x.controversies?.length||0),0))})")
          echo "controversies — committed:$OLD  regenerated:$NEW"
          if [ "$NEW" -lt "$OLD" ]; then
            echo "::error::Refresh would drop curated controversies ($OLD → $NEW). Implement seed-curated. Discarding export."
            git checkout -- src/data/officials.json
            exit 1
          fi

      - name: Commit + push if changed
        run: |
          if git diff --quiet -- src/data/officials.json; then
            echo "No data changes."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/data/officials.json
            git commit -m "chore(data): scheduled refresh $(date -u +%Y-%m-%d)"
            git push
          fi
